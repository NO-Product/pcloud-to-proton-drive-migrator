name: Offline tests

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      authorized:
        description: Run repository tests for this revision
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: offline-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    if: github.event_name != 'workflow_dispatch' || inputs.authorized
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run all offline unit and contract tests
        env:
          NO_PROXY: "*"
          no_proxy: "*"
          PIP_NO_INDEX: "1"
        run: make check
